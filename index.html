*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;font-size:13px;background:#f9f9f7;color:#1a1a1a;min-height:100vh}

.tbl-wrap{border:1px solid #e4e4dc;border-radius:8px;overflow:auto;max-height:calc(100vh - 130px)}
table{border-collapse:collapse;width:100%;min-width:900px}
thead th{padding:9px 12px;font-size:10px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;white-space:nowrap;cursor:pointer;user-select:none;background:#f0f0ec;position:sticky;top:0;z-index:1;border-bottom:1px solid #e4e4dc}
tbody tr{border-top:1px solid #e4e4dc;cursor:pointer;transition:background .1s}
tbody tr:hover{background:#f0f0ec}
td{padding:9px 12px;white-space:nowrap;font-variant-numeric:tabular-nums}
.link{color:#3B82F6;font-weight:600;text-decoration:underline;text-decoration-style:dotted;text-underline-offset:3px}
.badge{font-size:10.5px;font-weight:600;padding:2px 8px;border-radius:4px}
.bc{display:flex;align-items:center;gap:6px;margin-bottom:14px;flex-wrap:wrap}
.bc-item{font-size:12px;cursor:pointer;color:#3B82F6;text-decoration:underline;text-decoration-style:dotted;text-underline-offset:3px}
.bc-cur{font-size:12px;font-weight:600;color:#1a1a1a}
.bc-sep{color:#999;font-size:12px}
.section-label{font-size:10px;font-weight:700;letter-spacing:.09em;text-transform:uppercase;color:#555;margin-bottom:10px}

const f$=v=>"$"+Number(v).toLocaleString();

function Badge({g}){const s=GOAL[g]||{};return <span className="badge" style={{background:s.bg,color:s.color}}>{g}</span>}

function Th({ch,col,sort,onSort,align="right"}){
  return <th onClick={()=>onSort(col)} style={{textAlign:align,color:sort.col===col?"#1a1a1a":"#555"}}>
    {ch} <span style={{opacity:sort.col===col?1:.3,fontSize:9}}>{sort.col===col?(sort.dir===1?"↓":"↑"):"↕"}</span>
  </th>;
}

function useSort(def){
  const [sort,setSort]=useState({col:def,dir:1});
  const onSort=col=>setSort(s=>s.col===col?{col,dir:s.dir*-1}:{col,dir:1});
  const sortRows=rows=>[...rows].sort((a,b)=>{
    const va=a[sort.col],vb=b[sort.col];
    return va<vb?-sort.dir:va>vb?sort.dir:0;
  });
  return {sort,onSort,sortRows};
}

function CampaignsTable({onSelect}){

function App(){
  const [view,setView]=useState("campaigns");
  const [campaign,setCampaign]=useState(null);
  const [strategy,setStrategy]=useState(null);
  return <div className="wrap">
    {view==="campaigns" && <CampaignsTable onSelect={c=>{setCampaign(c);setView("strategies");}}/>}
    {view==="strategies" && <StrategiesTable campaign={campaign} onSelect={s=>{setStrategy(s);setView("creatives");}} onBack={()=>setView("campaigns")}/>}
    {view==="creatives" && <CreativesTable campaign={campaign} strategy={strategy} onBackC={()=>{setView("campaigns");setCampaign(null);setStrategy(null);}} onBackS={()=>{setView("strategies");setStrategy(null);}}/>}
  </div>;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
